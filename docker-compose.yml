services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: rag-ollama
    volumes:
      - ollama-data:/root/.ollama

  # One-shot: waits for Ollama, pulls the two models, then exits.
  ollama-init:
    image: ollama/ollama
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      sh -c "until ollama list >/dev/null 2>&1; do echo 'waiting for ollama'; sleep 2; done;
             ollama pull nomic-embed-text && ollama pull llama3.1:8b"
    restart: "no"

  backend:
    build: .
    container_name: rag-backend
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
      OLLAMA_HOST: http://ollama:11434
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: rag-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
  ollama-data: